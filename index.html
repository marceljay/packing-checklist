<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Build packing checklists tailored to your trip — private, offline, no account." />
    <meta name="theme-color" content="#16202e" />
    <!-- Suitcase favicon, inlined so the offline single-file build stays self-contained. -->
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cpath d='M12.5 11V9.2A1.8 1.8 0 0 1 14.3 7.4h3.4a1.8 1.8 0 0 1 1.8 1.8V11' fill='none' stroke='%2316202e' stroke-width='2' stroke-linecap='round'/%3E%3Crect x='5.5' y='10.5' width='21' height='15.5' rx='2.6' fill='%231f5673'/%3E%3Crect x='14.4' y='10.5' width='3.2' height='15.5' fill='%23d83a2b'/%3E%3Ccircle cx='16' cy='14.3' r='1' fill='%23f8f7f2'/%3E%3C/svg%3E"
    />
    <title>Packing Checklist</title>
    <!-- Apply the saved theme before paint so there's no light-mode flash. -->
    <script>
      (function () {
        try {
          var m = localStorage.getItem('packing-checklist-theme') || 'system';
          var dark =
            m === 'dark' ||
            (m === 'system' && matchMedia('(prefers-color-scheme: dark)').matches);
          if (dark) document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
